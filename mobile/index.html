<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>K-Lab</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0c0e12;
        --fg: rgba(248, 250, 252, 0.95);
        --fg-muted: rgba(248, 250, 252, 0.38);
        --accent: hsl(23, 90%, 54%);
      }

      html, body {
        height: 100%;
        background-color: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .screen {
        min-height: 100%;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-top: max(2.5rem, env(safe-area-inset-top));
        padding-bottom: max(2.5rem, env(safe-area-inset-bottom));
        padding-left: max(1.5rem, env(safe-area-inset-left));
        padding-right: max(1.5rem, env(safe-area-inset-right));
        text-align: center;
        gap: 0;
      }

      .wordmark {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.06em;
        line-height: 1;
        margin-bottom: 0.5rem;
      }

      .wordmark-k { color: var(--fg); }
      .wordmark-dash { color: var(--accent); }
      .wordmark-lab { color: var(--fg); }

      .tagline {
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--fg-muted);
        margin-bottom: 3rem;
      }

      .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid rgba(248, 250, 252, 0.08);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="screen">
      <div class="wordmark">
        <span class="wordmark-k">K</span><span class="wordmark-dash">-</span><span class="wordmark-lab">Lab</span>
      </div>
      <p class="tagline">B2B Financial Intelligence</p>
      <div class="spinner"></div>
    </div>
  </body>
</html>
